<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS | Soul Crystal Works</title>
  <style>
    body {
      margin: 0;
      font-family: Manrope, sans-serif;
      background: #f4efe6;
      color: #2f3623;
    }

    .cms-loading {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .cms-loading__card {
      width: min(560px, 100%);
      padding: 28px;
      border: 1px solid rgba(84, 92, 60, 0.14);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 18px 40px rgba(84, 92, 60, 0.08);
    }

    .cms-loading__card h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.02;
    }

    .cms-loading__card p {
      margin: 0;
      line-height: 1.7;
      color: #5e6648;
    }
  </style>
</head>
<body>
  <div class="cms-loading">
    <div class="cms-loading__card">
      <h1 id="cmsTitle">Editor online</h1>
      <p id="cmsMessage">Valido tu acceso antes de cargar el editor del sitio.</p>
      <div id="cmsActions" style="display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;"></div>
    </div>
  </div>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    (function() {
      const title = document.getElementById('cmsTitle');
      const message = document.getElementById('cmsMessage');
      const actions = document.getElementById('cmsActions');

      function createActionButton(label, onClick, secondary) {
        const button = document.createElement('button');
        button.type = 'button';
        button.textContent = label;
        button.style.minHeight = '46px';
        button.style.padding = '0 18px';
        button.style.borderRadius = '999px';
        button.style.border = secondary ? '1px solid rgba(84, 92, 60, 0.16)' : '1px solid transparent';
        button.style.background = secondary ? 'rgba(255,255,255,0.72)' : 'linear-gradient(135deg, #d6ac56, #8f6b2f)';
        button.style.color = secondary ? '#2f3623' : '#ffffff';
        button.style.fontWeight = '800';
        button.style.cursor = 'pointer';
        button.addEventListener('click', onClick);
        return button;
      }

      function clearActions() {
        actions.innerHTML = '';
      }

      function renderSignedOut() {
        title.textContent = 'Acceso privado';
        message.textContent = 'Solo la administradora puede abrir el editor. Inicia sesion con Netlify Identity para continuar.';
        clearActions();
        actions.appendChild(createActionButton('Iniciar sesion', function() {
          window.netlifyIdentity.open('login');
        }));
      }

      function loadCms() {
        title.textContent = 'Cargando editor';
        message.textContent = 'Acceso validado. Estoy cargando el panel de edicion.';
        clearActions();

        const script = document.createElement('script');
        script.src = 'https://unpkg.com/decap-cms@3.5.0/dist/decap-cms.js';
        script.onload = function() {
          message.textContent = 'Editor cargado correctamente.';
          actions.appendChild(createActionButton('Cerrar sesion', function() {
            window.netlifyIdentity.logout();
          }, true));
        };
        script.onerror = function() {
          title.textContent = 'No pude cargar el editor';
          message.textContent = 'Hubo un problema cargando Decap CMS. Recarga la pagina o intenta de nuevo en unos minutos.';
          actions.appendChild(createActionButton('Recargar', function() {
            window.location.reload();
          }, true));
        };
        document.body.appendChild(script);
      }

      function initializeIdentity() {
        if (!window.netlifyIdentity) {
          title.textContent = 'Identity no disponible';
          message.textContent = 'No pude conectar con Netlify Identity. Revisa si el servicio esta activo en Netlify.';
          return;
        }

        window.netlifyIdentity.on('init', function(user) {
          if (user) {
            loadCms();
            return;
          }

          renderSignedOut();
        });

        window.netlifyIdentity.on('login', function() {
          window.location.href = '/admin/';
        });

        window.netlifyIdentity.on('logout', function() {
          window.location.href = '/admin/';
        });

        window.netlifyIdentity.init();
      }

      initializeIdentity();
    }());
  </script>
</body>
</html>
